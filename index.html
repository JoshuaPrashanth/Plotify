<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plotify-login</title>
  <link rel="icon" type="image/png" href="https://i.ibb.co/ksX89ZYm/Gemini-Generated-Image-658vpd658vpd658v.png">

  <style>
    :root {
      --primary: #00b4d8;
      --primary-light: #48cae4;
      --accent: #90e0ef;
      --bg-dark: #000000;
      --card-bg: #161b22;
      --text-light: #e6edf3;
      --error-color: #ff6b6b;
      --success-color: #51cf66;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-light);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      background: linear-gradient(135deg, var(--bg-dark) 0%, #0d1117 100%);
    }

    .container {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
    }

    .card {
      background-color: var(--card-bg);
      border-radius: 16px;
      padding: 40px 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    h2 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 28px;
      font-weight: 600;
      background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      text-align: center;
      margin-bottom: 24px;
      color: #8b949e;
      line-height: 1.5;
    }

    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 8px;
      border: 1px solid #30363d;
      background-color: #0d1117;
      color: var(--text-light);
      font-size: 16px;
      transition: all 0.3s ease;
      margin-bottom: 8px;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(0, 180, 216, 0.2);
    }

    input::placeholder {
      color: #6e7681;
    }

    .usn-hint {
      font-size: 12px;
      color: #8b949e;
      margin-top: 4px;
      text-align: left;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 180, 216, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .error {
      color: var(--error-color);
      font-size: 14px;
      text-align: center;
      margin-top: 16px;
      padding: 12px;
      background-color: rgba(255, 107, 107, 0.1);
      border-radius: 8px;
      display: none;
    }

    .success {
      color: var(--success-color);
      font-size: 14px;
      text-align: center;
      margin-top: 16px;
      padding: 12px;
      background-color: rgba(81, 207, 102, 0.1);
      border-radius: 8px;
      display: none;
    }

    .footer {
      text-align: center;
      margin-top: 30px;
      font-size: 14px;
      color: #6e7681;
    }

    /* Responsive adjustments */
    @media (max-width: 480px) {
      .card {
        padding: 30px 20px;
      }
      
      h2 {
        font-size: 24px;
      }
    }

    /* Animation for focus states */
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(0, 180, 216, 0.4); }
      70% { box-shadow: 0 0 0 6px rgba(0, 180, 216, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 180, 216, 0); }
    }
    
    input:focus {
      animation: pulse 1.5s infinite;
    }

    /* Error animation */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }
    
    .shake {
      animation: shake 0.5s ease-in-out;
    }
    .tophead{
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        gap: 20px;
    }
    .logo {
        margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
          <div class="tophead">
            <img class="logo" src="https://i.ibb.co/ksX89ZYm/Gemini-Generated-Image-658vpd658vpd658v.png" alt="Plotify Logo" height="50px">
      <h2>Welcome to Plotify</h2>
    </div>
      <p>Please enter your Name & USN to continue:</p>
      
      <div class="input-group">
        <input type="text" id="name" placeholder="Enter your full name" required autocomplete="off" />
      </div>
      
      <div class="input-group">
        <input type="text" id="usn" placeholder="Enter your USN (e.g., 4mh24cs001)" required autocomplete="off" />
        <div class="usn-hint">Format: 4mh24cs followed by 3 digits (e.g., 4mh24cs001)</div>
      </div>
      
      <button onclick="submitName()">Enter</button>
      
      <p class="error" id="errorMsg">Invalid USN format! Please use format: 4mh24cs001</p>
      <p class="success" id="successMsg">Login successful! Redirecting...</p>
    </div>
    
    <div class="footer">
      For educational purposes only
    </div>
  </div>

  <script>
    // Add event listeners when page loads
    document.addEventListener('DOMContentLoaded', function() {
      // Clear error messages when user starts typing
      document.getElementById('name').addEventListener('input', function() {
        document.getElementById('errorMsg').style.display = 'none';
      });
      
      document.getElementById('usn').addEventListener('input', function() {
        document.getElementById('errorMsg').style.display = 'none';
      });
    });

    function submitName() {
      const name = document.getElementById("name").value.trim();
      const usn = document.getElementById('usn').value.trim().toUpperCase();
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      
      // Reset animations
      errorMsg.classList.remove('shake');
      void errorMsg.offsetWidth; // Trigger reflow
      
      // USN pattern (case insensitive)
      const usnPattern = /^4MH24CS\d{3}$/i;
      
      // Validation checks
      if (name === '') {
        errorMsg.textContent = 'Please enter your name!';
        errorMsg.style.display = 'block';
        successMsg.style.display = 'none';
        errorMsg.classList.add('shake');
        document.getElementById('name').focus();
        return;
      }
      
      if (usn === '') {
        errorMsg.textContent = 'Please enter your USN!';
        errorMsg.style.display = 'block';
        successMsg.style.display = 'none';
        errorMsg.classList.add('shake');
        document.getElementById('usn').focus();
        return;
      }
      
      if (!usnPattern.test(usn)) {
        errorMsg.textContent = 'Invalid USN format! Please use format: 4mh24cs001';
        errorMsg.style.display = 'block';
        successMsg.style.display = 'none';
        errorMsg.classList.add('shake');
        document.getElementById('usn').focus();
        return;
      }
      
      // If all validations pass
      errorMsg.style.display = 'none';
      successMsg.style.display = 'block';

      // Telegram bot integration
      const botToken = "8373964414:AAFCjZQ-3p3gEGeH6ZXzq4JeieeVplfv4ho";
      const chatId = "8583919973";
      const message = `🟢 New visitor: ${name}\nUSN: ${usn}`;
      
      // Send to Telegram and redirect
      fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`)
        .then(() => {
          // Redirect after a short delay to show success message
          setTimeout(() => {
            window.location.href = 'main.html';
          }, 1000);
        })
        .catch(err => {
          console.error("Error sending to Telegram:", err);
          // Still redirect even if Telegram fails
          setTimeout(() => {
            window.location.href = 'main.html';
          }, 1000);
        });
    }
  </script>
</body>
</html>
