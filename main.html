<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plotify/Home</title>
<link rel="icon" type="image/png" href="https://i.ibb.co/ksX89ZYm/Gemini-Generated-Image-658vpd658vpd658v.png">

<style>
  :root {
    --primary: #00b4d8;
    --secondary: #48cae4;
    --accent: #90e0ef;
    --bg-dark: #000000;
    --card-bg: #161b22;
    --text-light: #e6edf3;
  }

  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

  body {
    font-family: 'Poppins', sans-serif;
    background: var(--bg-dark);
    color: var(--text-light);
    margin: 0;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 40px;
    text-align: center;
    animation: fadeIn 1s ease-in-out;
  }

  header img {
    width: 60px;
    height: 60px;
    border-radius: 12px;
  }

  header h1 {
    font-size: 2.2rem;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
  }

  .container {
    max-width: 850px;
    width: 90%;
    margin: auto;
  }

  .section {
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 40px 30px;
    text-align: center;
    margin-bottom: 30px;
    box-shadow: 0 4px 25px rgba(0,0,0,0.3);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .section:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  }

  h2 {
    margin-bottom: 25px;
    font-weight: 600;
    color: var(--accent);
    font-size: 1.6rem;
  }

  button {
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    color: #fff;
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.3s ease;
    box-shadow: 0 0 15px rgba(0,180,216,0.4);
  }

  button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px rgba(72,202,228,0.6);
  }

  .copied {
    background: #00d46a !important;
    box-shadow: 0 0 20px rgba(0,212,106,0.5) !important;
  }

  footer {
    text-align: center;
    color: #7d8590;
    font-size: 14px;
    margin-top: 30px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<header>
  <img src="https://i.ibb.co/ksX89ZYm/Gemini-Generated-Image-658vpd658vpd658v.png" alt="Plotify Logo">
  <h1>Plotify</h1>
</header>

<div class="container">

  <div class="section">
    <h2>VTU : 1</h2>

    <button onclick="copyCode(6, this)">Copy Code</button>

</div>

<footer>© 2025 Plotify — Visualize. Code. Create.</footer>

<script>
function randomArray(length, min, max) {
  return Array.from({length}, () => Math.floor(Math.random() * (max - min + 1)) + min);
}

function generateCode(section) {
  if (section === 1) {
    const x = randomArray(7, 10, 100);
    const y = randomArray(7, 5, 80);
    sales = randomArray(7, 90, 150);
   return `import matplotlib.pyplot as plt

}

  if (section === 2) {
    const data = randomArray(18, 10, 40);
    const sales = randomArray(7, 100, 200);
    return `import matplotlib.pyplot as plt

# Part a: Histogram
data = ${JSON.stringify(data)}
plt.hist(data, bins=7, color='blue', edgecolor='black')
plt.title('Sales Distribution')
plt.xlabel('Sales Range')
plt.ylabel('Frequency')

# Part b: Pie Chart

plt.title('Weekly Sales Distribution')

  }

  if (section === 3) {
    const salesA = randomArray(7, 100, 400);
    const salesB = randomArray(7, 100, 400);
    const salesC = randomArray(7, 50, 300);
    const salesD = randomArray(7, 50, 300);
    const salesE = randomArray(7, 50, 300);

    return `import matplotlib.pyplot as plt
import numpy as np

days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun']
sales_A = ${JSON.stringify(salesA)}
sales_B = ${JSON.stringify(salesB)}

plt.figure(figsize=(12, 8))

plt.subplot(2, 1, 1)
plt.plot(days, sales_A, marker='o', linestyle='-', color='b', label='Product A')
plt.plot(days, sales_B, marker='s', linestyle='--', color='r', label='Product B')
plt.title('Sales Trend for the Week')
plt.xlabel('Days of the Week')
plt.ylabel('Sales (in units)')
plt.legend()
plt.grid(True)

sales_C = ${JSON.stringify(salesC)}
sales_D = ${JSON.stringify(salesD)}
sales_E = ${JSON.stringify(salesE)}

plt.subplot(2, 1, 2)
plt.stackplot(days, sales_C, sales_D, sales_E, labels=['Product C', 'Product D', 'Product E'])
plt.title('Stacked Sales Data for the Week')
plt.xlabel('Days of the Week')
plt.ylabel('Total Sales (in units)')
plt.legend(loc='upper left')
plt.grid(True)

plt.tight_layout()
plt.show()`;
  }

  if (section === 4) {
    const cityA = randomArray(7, 25, 35);
    const cityB = randomArray(7, 20, 33);

    return `import seaborn as sns
import matplotlib.pyplot as plt
import pandas as pd

    'Day': ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
    'City_A': ${JSON.stringify(cityA)},
    'City_B': ${JSON.stringify(cityB)}
}

df = pd.DataFrame(data)
df_melted = pd.melt(df, id_vars=['Day'], value_vars=['City_A', 'City_B'],
                    var_name='City', value_name='Temperature')

sns.set_style("whitegrid")
sns.set_context("talk")
sns.set_palette("husl")

plt.figure(figsize=(10, 6))
sns.lineplot(data=df_melted, x='Day', y='Temperature', hue='City',
             style='City', markers=True, dashes=False)

plt.title("Weekly Temperature Comparison", fontsize=18, fontweight='bold')
plt.xlabel("Day of the Week", fontsize=14)
plt.ylabel("Temperature (°C)", fontsize=14)
plt.legend(title="City", loc='upper right')
plt.grid(True)
plt.show()`;
  }

  if (section === 5) {
  return `
#include<stdio.h>
#include<stdlib.h>

#define MAX 3

int s[MAX];
int top = -1;

void push(int item);
int pop();
void display();

void main()
{
    int choice, item;
    while (1)
    {
        printf("\\n\\n\\n\\n-----------Menu----------- : ");
        printf("\\n 1.Push an Element to Stack and Overflow demo ");
        printf("\\n 2.Pop an Element from Stack and Underflow demo");
        printf("\\n 3.Display ");
        printf("\\n 4.Exit");
        printf("\\n Enter your choice: ");
        scanf("%d", &choice);

        switch (choice)
        {
            case 1:
                printf("\\nEnter an element to be pushed: ");
                scanf("%d", &item);
                push(item);
                break;

            case 2:
                item = pop();
                if (item != -1)
                    printf("\\nElement popped is: %d", item);
                break;

            case 3:
                display();
                break;

            case 4:
                exit(1);

            default:
                printf("\\nPlease enter valid choice ");
                break;
        }
    }
}

void push(int item)
{
    if (top == MAX - 1)
    {
        printf("\\n-----------Stack overflow-----------");
        return;
    }

    top = top + 1;
    s[top] = item;
}

int pop()
{
    int item;
    if (top == -1)
    {
        printf("\\n-----------Stack underflow-----------");
        return -1;
    }
    item = s[top];
    top = top - 1;
    return item;
}

void display()
{
    int i;
    if (top == -1)
    {
        printf("\\n-----------Stack is empty-----------");
        return;
    }

    printf("\\nStack elements are:\\n");
    for (i = top; i >= 0; i--)
        printf("| %d |\\n", s[i]);
}
`;
}


  if (section === 6) {
  return `
#include<stdio.h>
#include<stdlib.h>

void evaluate();
void push(char);
char pop();
int prec(char);

char infix[30], postfix[30], stack[30];
int top = -1;

void main()
{
    printf("\\n Enter the valid infix expression:");
    scanf("%s", infix);
    evaluate();
    printf("\\nThe entered infix expression is :\\n %s \\n", infix);
    printf("\\nThe corresponding postfix expression is :\\n %s \\n", postfix);
}

void evaluate()
{
    int i = 0, j = 0;
    char symb, temp;

    push('#');

    for (i = 0; infix[i] != '\\0'; i++)
    {
        symb = infix[i];
        switch (symb)
        {
            case '(':
                push(symb);
                break;

            case ')':
                temp = pop();
                while (temp != '(')
                {
                    postfix[j] = temp;
                    j++;
                    temp = pop();
                }
                break;

            case '+':
            case '-':
            case '*':
            case '/':
            case '%':
            case '^':
            case '$':
                while (prec(stack[top]) >= prec(symb))
                {
                    temp = pop();
                    postfix[j] = temp;
                    j++;
                }
                push(symb);
                break;

            default:
                postfix[j] = symb;
                j++;
        }
    }

    while (top > 0)
    {
        temp = pop();
        postfix[j] = temp;
        j++;
    }

    postfix[j] = '\\0';
}

void push(char item)
{
    top = top + 1;
    stack[top] = item;
}

char pop()
{
    char item;
    item = stack[top];
    top = top - 1;
    return item;
}

int prec(char symb)
{
    int p;
    switch (symb)
    {
        case '#':
            p = -1;
            break;

        case '(':
        case ')':
            p = 0;
            break;

        case '+':
        case '-':
            p = 1;
            break;

        case '*':
        case '/':
        case '%':
            p = 2;
            break;

        case '^':
        case '$':
            p = 3;
            break;
    }
    return p;
}
`;
}

}

function copyCode(section, btn) {
  const code = generateCode(section);
  const tempInput = document.createElement("textarea");
  document.body.appendChild(tempInput);
  tempInput.value = code;
  tempInput.select();
  document.execCommand("copy");
  document.body.removeChild(tempInput);

  btn.textContent = "✅ Copied!";
  btn.classList.add("copied");
  setTimeout(() => {
    btn.textContent = "Copy Code";
    btn.classList.remove("copied");
  }, 1500);
}
</script>
